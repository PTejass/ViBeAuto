<!DOCTYPE html>
<html>
<head>
    <title>ViBe Auto</title>
    <style>
        body { width: 250px; padding: 12px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        input[type="text"], input[type="password"], input[type="number"], select { width: 100%; box-sizing: border-box; margin-bottom: 8px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9em; }
        button { width: 100%; padding: 8px; margin-bottom: 8px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.9em; }
        #saveKeyBtn { background-color: #007bff; color: white; margin-top: 5px; }
        #saveKeyBtn:hover { background-color: #0056b3; }
        .success { color: green; display: none; margin-bottom: 8px; font-size: 0.85em; text-align: center; }
        label { font-size: 0.85em; font-weight: bold; display: block; margin-bottom: 3px; }
        h3 { margin-top: 0; margin-bottom: 10px; color: #333; text-align: center; font-size: 1.1em; }
        hr { border: 0; border-top: 1px solid #eee; margin: 12px 0; }
        
        .file-drop-area { position: relative; display: flex; align-items: center; width: 100%; padding: 8px; border: 2px dashed #007bff; border-radius: 8px; background-color: #f8f9fa; transition: 0.3s; cursor: pointer; box-sizing: border-box; }
        .file-drop-area:hover { background-color: #e9ecef; border-color: #0056b3; }
        .choose-btn { flex-shrink: 0; background-color: #007bff; border-radius: 4px; color: white; padding: 5px 10px; font-size: 0.8em; margin-right: 10px; pointer-events: none; }
        .file-msg { font-size: 0.8em; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; flex-grow: 1; }
        #vcamFileInput { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        #deleteVcamBtn { 
            display: none; 
            margin-left: 10px; 
            font-size: 1.2em; 
            font-weight: bold; 
            color: #dc3545; 
            cursor: pointer; 
            z-index: 10; 
            padding: 0 5px;
            transition: 0.2s;
        }
        #deleteVcamBtn:hover { color: #a71d2a; transform: scale(1.2); }

        .footer { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 15px; 
            padding-top: 10px; 
            border-top: 1px solid #eee; 
            font-size: 0.65em; 
            font-weight: bold; 
            letter-spacing: 0.5px;
        }
        .footer a { 
            color: #333; 
            text-decoration: none; 
            opacity: 0.7; 
            transition: 0.2s; 
            display: flex;
            align-items: center;
        }
        .footer a:hover { opacity: 1; }
        .credit { opacity: 0.6; }
        .author { 
            font-family: 'Brush Script MT', 'Comic Sans MS', cursive; 
            font-size: 1.2em;
            cursor: pointer; 
            transition: 0.2s; 
        }
        .author a { color: inherit; text-decoration: none; opacity: 0.8; }
        .author a:hover { opacity: 1; text-decoration: underline; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; appearance: textfield; }
    </style>
</head>
<body>
    <h3>ViBe Auto</h3>
    
    <label>Gemini API Key:</label>
    <input type="password" id="geminiApiKey" placeholder="AI Studio Key">
    
    <label>Groq API Key:</label>
    <input type="password" id="groqApiKey" placeholder="Groq Cloud Key">

    <label>Select AI Model:</label>
    <select id="modelChoice">
        <option value="gemini">Gemini 3.1 Flash</option>
        <option value="groq">Groq LLaMA 3.1 8B</option>
    </select>

    <div id="saveStatus" class="success">Saved!</div>
    <button id="saveKeyBtn">Save Settings</button>
    
    <hr>
    <h3>Automation</h3>
    <button id="toggleAutoBtn" style="background-color: #eee; color: #333;">Automation: OFF</button>
    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 5px;">
        <span style="font-size: 0.75em; font-weight: bold; color: #666;">Forced Speed:</span>
        <input type="number" id="vidSpeed" step="1" min="1" max="16" placeholder="11" style="width: 40px; padding: 4px; margin-bottom: 0; text-align: center;">
        <button id="toggleSpeedBtn" style="width: 50px; padding: 4px; margin-bottom: 0; background-color: #eee; color: #333; font-size: 0.8em;">OFF</button>
    </div>

    <hr>
    <h3>Virtual Camera</h3>
    <button id="toggleVCamBtn" style="background-color: #eee; color: #333;">VCam: OFF</button>
    
    <div id="vcamGallerySection" style="display: none;">
        <label>Gallery (Select Video):</label>
        <div class="file-drop-area">
            <span class="choose-btn">Choose Video</span>
            <span class="file-msg" id="vcamFileName">No video selected</span>
            <span id="deleteVcamBtn" title="Remove video">&times;</span>
            <input type="file" id="vcamFileInput" accept="video/*">
        </div>
    </div>

    <div class="footer">
        <a href="https://github.com/git-lakshy/ViBeAuto" target="_blank" title="View Source on GitHub">

        </a>
        <span class="credit"><span class="author"><a href="https://lakshyeah.in" target="_blank">Creator</a></span></span>
    </div>

    <script src="popup.js"></script>
</body>
</html>
