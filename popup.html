<!DOCTYPE html>
<html>
<head>
    <title>ViBe Auto</title>
    <style>
        body { width: 300px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        input[type="text"], input[type="password"], input[type="number"] { width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; margin-bottom: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #saveKeyBtn { background-color: #007bff; color: white; }
        #saveKeyBtn:hover { background-color: #0056b3; }
        .success { color: green; display: none; margin-bottom: 10px; font-size: 0.9em; text-align: center; }
        label { font-size: 0.9em; font-weight: bold; display: block; margin-bottom: 5px; }
        h3 { margin-top: 0; color: #333; text-align: center; }
        hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }
        
        /* Styled File Chooser */
        .file-drop-area {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            padding: 10px;
            border: 2px dashed #007bff;
            border-radius: 8px;
            background-color: #f8f9fa;
            transition: 0.3s;
            cursor: pointer;
            box-sizing: border-box;
        }
        .file-drop-area:hover {
            background-color: #e9ecef;
            border-color: #0056b3;
        }
        .choose-btn {
            flex-shrink: 0;
            background-color: #007bff;
            border-radius: 4px;
            color: white;
            padding: 5px 10px;
            font-size: 0.8em;
            margin-right: 10px;
            pointer-events: none;
        }
        .file-msg {
            font-size: 0.8em;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }
        #vcamFileInput {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h3>ViBe Auto</h3>
    
    <label>Gemini API Key:</label>
    <input type="password" id="geminiApiKey" placeholder="AI Studio Key">
    
    <label>Groq API Key:</label>
    <input type="password" id="groqApiKey" placeholder="Groq Cloud Key">

    <label>Select AI Model:</label>
    <select id="modelChoice" style="width: 100%; margin-bottom: 15px; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        <option value="gemini">Gemini 3.1 Flash</option>
        <option value="groq">Groq LLaMA 3.1 8B</option>
    </select>

    <div id="saveStatus" class="success">Saved!</div>
    <button id="saveKeyBtn">Save Settings</button>
    
    <hr>
    
    <label>Automation Status:</label>
    <button id="toggleAutoBtn" style="background-color: #eee; color: #333;">Enable Automation</button>

    <hr>
    <h3>Virtual Camera</h3>
    <button id="toggleVCamBtn" style="background-color: #eee; color: #333;">VCam: OFF</button>
    
    <div id="vcamGallerySection" style="display: none;">
        <label>Gallery (Select Video):</label>
        <div class="file-drop-area">
            <span class="choose-btn">Choose Video</span>
            <span class="file-msg" id="vcamFileName">No file selected</span>
            <input type="file" id="vcamFileInput" accept="video/*">
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
